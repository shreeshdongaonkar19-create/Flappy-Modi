<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel ="icon" href="main.png">
<title>Flappy Modi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#87CEEB;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#game{
    width:420px;
    height:600px;
    background:linear-gradient(#87CEEB,#c9f0ff);
    position:relative;
    overflow:hidden;
    border:3px solid #000;
}

#bird{
    width:50px;
    height:50px;
    position:absolute;
    left:80px;
    top:250px;
    z-index:10;
    transition:transform .1s;
}

#bird img{
    width:100%;
    height:100%;
    border-radius:50%;
}

.pipe{
    position:absolute;
    width:60px;
    background: #1f7909;
background: linear-gradient(90deg, rgba(31, 121, 9, 1) 46%, rgba(71, 121, 9, 1) 80%);
    right:-60px;
	
}

.topPipe{
    top:0;
	
}

.bottomPipe{
    bottom:0;
}

#score{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    font-weight:bold;
    color:white;
    text-shadow:2px 2px 4px black;
    z-index:100;
}

#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:200;
}

button{
    margin-top:20px;
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="game">

<div id="score">BJP votes 0</div>

<div id="bird">
    <img src="main.png">
</div>

<div id="gameOver">
    <h1>Samay Samapt</h1>
	<img src="death.png">
    <h2 id="finalScore"></h2>
    <button onclick="location.reload()">Restart</button>
</div>

</div>

<script>

const game = document.getElementById("game");
const bird = document.getElementById("bird");
const scoreText = document.getElementById("score");

let birdY = 250;
let velocity = 0;
let gravity = 0.4;
let jumpForce = -7;

let score = 0;
let gameRunning = true;

document.addEventListener("click", jump);
document.addEventListener("keydown", e=>{
    if(e.code==="Space"){
        jump();
    }
});

function jump(){
    if(!gameRunning) return;
    velocity = jumpForce;
}

function createPipe(){

    const gap = 170;
    const topHeight = Math.floor(Math.random()*250)+50;

    const topPipe = document.createElement("div");
    topPipe.classList.add("pipe","topPipe");
    topPipe.style.height = topHeight+"px";

    const bottomPipe = document.createElement("div");
    bottomPipe.classList.add("pipe","bottomPipe");
    bottomPipe.style.height =
    (600-topHeight-gap)+"px";

    game.appendChild(topPipe);
    game.appendChild(bottomPipe);

    let pipeX = 420;
    let scored = false;

    const movePipe = setInterval(()=>{

        if(!gameRunning){
            clearInterval(movePipe);
            return;
        }

        pipeX -= 3;

        topPipe.style.left = pipeX+"px";
        bottomPipe.style.left = pipeX+"px";

        let birdRect = bird.getBoundingClientRect();
        let topRect = topPipe.getBoundingClientRect();
        let bottomRect = bottomPipe.getBoundingClientRect();

        if(
            birdRect.left < topRect.right &&
            birdRect.right > topRect.left &&
            (
                birdRect.top < topRect.bottom ||
                birdRect.bottom > bottomRect.top
            )
        ){
            gameOver();
        }

        if(pipeX < 80 && !scored){
            score++;
            scoreText.innerText = score;
            scored = true;
        }

        if(pipeX < -70){
            clearInterval(movePipe);
            topPipe.remove();
            bottomPipe.remove();
        }

    },20);
}

setInterval(()=>{
    if(gameRunning){
        createPipe();
    }
},2000);

function updateBird(){

    if(!gameRunning) return;

    velocity += gravity;
    birdY += velocity;

    bird.style.top = birdY+"px";

    if(velocity < 0){
        bird.style.transform="rotate(-25deg)";
    }else{
        bird.style.transform="rotate(70deg)";
    }

    if(birdY < 0){
        gameOver();
    }

    if(birdY > 550){
        gameOver();
    }

    requestAnimationFrame(updateBird);
}

function gameOver(){

    if(!gameRunning) return;

    gameRunning = false;

    document.getElementById("gameOver").style.display="flex";
    document.getElementById("finalScore").innerText =
    "Score: "+score;
}

updateBird();

</script>

</body>
</html>
